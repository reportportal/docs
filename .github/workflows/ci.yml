name: CI Build

on:
  pull_request:
    branches:
      - master
      - develop
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install of node dependencies
        run: npm ci

      - name: Check for dots in doc filenames
        run: |
          found=$(find docs -type f \( -name "*.md" -o -name "*.mdx" \) | while IFS= read -r f; do
            stem=$(basename "$f" | sed 's/\.[^.]*$//')
            if echo "$stem" | grep -q '\.'; then
              echo "$f"
            fi
          done)
          if [ -n "$found" ]; then
            echo "::error::Doc filenames with dots create broken Amplify URLs. Use dashes instead (e.g. Version25-1-1.md):"
            echo "$found"
            exit 1
          fi

      - name: Run lint
        run: npm run lint

      - name: Build the source code
        run: npm run build
